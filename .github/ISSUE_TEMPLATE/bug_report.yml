name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: >
        The input files that trigger it (redact real secrets) and the exact
        command, e.g. `driftcheck compare a.env b.env`.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: driftcheck version
      description: Output of `driftcheck version`
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - npm (driftcheck-cli)
        - built from source
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / architecture
    validations:
      required: true
