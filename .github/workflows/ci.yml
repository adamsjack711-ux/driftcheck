name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -cover

      - name: Build
        run: go build -trimpath -ldflags="-s -w -X main.version=ci" -o driftcheck .

      - name: Smoke test the built binary
        shell: bash
        run: |
          ./driftcheck version
          # Flags must precede file args (Go flag.Parse). Fixture has intentional
          # drift (exit 1) — this just checks the binary runs and emits JSON.
          ./driftcheck compare --json examples/dev.env examples/prod.env > /tmp/out.json || true
          test -s /tmp/out.json

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
